name: Example - Terraform VM Recreate

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Git Push + Terraform Import + Apply
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash
    env:
      TF_VAR_project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      TF_VAR_service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      TF_VAR_ssh_public_key: ${{ secrets.GCP_VM_SSH_PUBLIC_KEY }}
      TF_VAR_ssh_username: ${{ vars.GCP_VM_SSH_USERNAME }}
      TF_VAR_instance_name: ${{ vars.GCP_INSTANCE_NAME }}
      TF_VAR_firewall_name: ${{ vars.GCP_FIREWALL_NAME }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up GCP credentials
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > $HOME/gcp-key.json
        echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-key.json" >> $GITHUB_ENV

    - name: Install gcloud CLI
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        service_account_key: ${{ secrets.GCP_CREDENTIALS }}
        export_default_credentials: true

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Import (VM + Firewall)
      run: |
        set -e

        echo "🔍 Checking if VM is already in Terraform state..."
        if terraform state list | grep -q google_compute_instance.vm_instance; then
          echo "✅ VM already in state. Skipping import."
        else
          echo "📦 Importing VM into state"
          terraform import google_compute_instance.vm_instance "projects/${TF_VAR_project_id}/zones/asia-south1-a/instances/${TF_VAR_instance_name}"
        fi

        echo "🔍 Checking if Firewall is already in Terraform state..."
        if terraform state list | grep -q google_compute_firewall.allow_http_https_ssh; then
          echo "✅ Firewall already in state. Skipping import."
        else
          echo "📦 Importing Firewall into state"
          terraform import google_compute_firewall.allow_http_https_ssh "projects/${TF_VAR_project_id}/global/firewalls/${TF_VAR_firewall_name}"
        fi

    - name: Taint the VM
      run: terraform taint google_compute_instance.vm_instance || echo "⚠️ VM not found in state"

    - name: Terraform Apply
      run: terraform apply -auto-approve
